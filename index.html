<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aevora</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/satoshi@1.0.3/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/satoshi@1.0.3/500.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/satoshi@1.0.3/700.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090717;color:#F0EEF8;font-family:'Satoshi','Inter',sans-serif;min-height:100vh;display:flex;justify-content:center}
#av{width:100%;max-width:480px;background:#090717;min-height:100vh;font-family:'Satoshi','Inter',sans-serif;scroll-padding-bottom:80px;}
@keyframes av-f{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes av-p{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes av-s{to{transform:rotate(360deg)}}
@keyframes av-sr{to{transform:rotate(-360deg)}}
@keyframes av-sh{0%,100%{opacity:.1}50%{opacity:.6}}
@keyframes av-pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes av-d{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
@keyframes av-drift{0%{transform:translate(0,0)}25%{transform:translate(4px,-6px)}50%{transform:translate(-3px,-10px)}75%{transform:translate(-6px,-4px)}100%{transform:translate(0,0)}}
@keyframes av-drift2{0%{transform:translate(0,0)}33%{transform:translate(-8px,5px)}66%{transform:translate(6px,8px)}100%{transform:translate(0,0)}}
@keyframes av-drift3{0%{transform:translate(0,0)}50%{transform:translate(10px,-8px)}100%{transform:translate(0,0)}}
@keyframes av-card-glow-purple{0%,100%{box-shadow:0 0 18px rgba(167,139,250,.12),0 4px 20px rgba(0,0,0,.3)}50%{box-shadow:0 0 28px rgba(167,139,250,.22),0 4px 20px rgba(0,0,0,.3)}}
@keyframes av-card-glow-gold{0%,100%{box-shadow:0 0 18px rgba(242,201,76,.1),0 4px 20px rgba(0,0,0,.3)}50%{box-shadow:0 0 28px rgba(242,201,76,.2),0 4px 20px rgba(0,0,0,.3)}}
@keyframes av-card-glow-cyan{0%,100%{box-shadow:0 0 18px rgba(34,211,238,.1),0 4px 20px rgba(0,0,0,.3)}50%{box-shadow:0 0 28px rgba(34,211,238,.2),0 4px 20px rgba(0,0,0,.3)}}
@keyframes av-stagger{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes av-esp-ring{from{stroke-dashoffset:var(--ring-empty)}to{stroke-dashoffset:var(--ring-offset)}}
.av-f{animation:av-f .45s ease forwards}
.av-p{animation:av-p 3s ease-in-out infinite}
.av-btn{font-family:'Satoshi','Inter',sans-serif;font-size:15px;cursor:pointer;border:1px solid rgba(0,229,192,.4);background:transparent;color:#00E5C0;padding:11px 22px;border-radius:3px;letter-spacing:.04em;transition:all .2s;display:inline-block}
.av-btn:hover:not([disabled]){background:rgba(0,229,192,.1);border-color:#00E5C0}
.av-btn[disabled]{opacity:.35;cursor:not-allowed}
.av-solid{background:#00E5C0!important;color:#0D0B1A!important;border:none!important;font-weight:600}
.av-solid:hover:not([disabled]){background:#00cead!important}
.av-gold{border-color:rgba(242,201,76,.35)!important;color:#F2C94C!important}
.av-gold:hover:not([disabled]){background:rgba(242,201,76,.1)!important;border-color:#F2C94C!important}
.av-in{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:12px;color:#F0EEF8;padding:12px 15px;font-family:'Satoshi','Inter',sans-serif;font-size:16px;transition:all .25s;outline:none}
.av-in:focus{border-color:rgba(0,229,192,.5);background:rgba(0,229,192,.05);box-shadow:0 0 0 3px rgba(0,229,192,.08)}
.av-in::placeholder{color:rgba(255,255,255,.28)}
.av-msgs::-webkit-scrollbar{width:3px}
.av-msgs::-webkit-scrollbar-thumb{background:rgba(0,229,192,.25);border-radius:2px}

/* ── Colourful module icon styles */
.av-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;margin-bottom:10px}
.av-card-grad{background:linear-gradient(135deg,rgba(26,16,48,0.95) 0%,rgba(20,12,40,0.98) 100%);border-radius:14px;padding:16px;transition:all .25s;position:relative;overflow:hidden}
.av-card-grad::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;border-radius:14px}
.av-card-grad:hover::before{opacity:1}
.av-card-grad.on{cursor:pointer}
.av-card-grad.on:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}

</style>
</head>

function h(t,p,...c){
  const e=document.createElement(t);
  if(p)for(const[k,v]of Object.entries(p)){
    if(k==='css')Object.assign(e.style,v);
    else if(k==='cls')e.className=v;
    else if(k==='on')Object.entries(v).forEach(([n,f])=>e.addEventListener(n,f));
    else e[k]=v;
  }
  for(const x of c.flat()){
    if(x==null)continue;
    e.appendChild(typeof x==='string'?document.createTextNode(x):x);
  }
  return e;
}

// ── TYPEWRITER EFFECT
function stripMd(t){
  // Remove *italic* and **bold** markers, keep content
  return t.replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^[\*\-] /gm,'').trim();
}
function typeWriter(el,text,speed,onDone){
  text=stripMd(text||'');
  speed=speed||8;el.textContent='';var i=0;
  var cur=document.createElement('span');
  cur.style.cssText='display:inline-block;width:2px;height:.9em;background:currentColor;margin-left:2px;vertical-align:text-bottom;opacity:.7;border-radius:1px;animation:av-p .7s ease-in-out infinite;';
  el.appendChild(cur);
  function tick(){
    if(i<text.length){
      cur.before(document.createTextNode(text[i]));
      i++;
      var delay=speed+(text[i-1]==='.'||text[i-1]==='!'||text[i-1]==='?'?120:text[i-1]===','?60:0);
      setTimeout(tick,delay);
    }else{cur.remove();if(onDone)onDone();}
  }
  tick();
}

// ── GOLD PARTICLE ANIMATION
function goldParticles(anchor){
  var cx=window.innerWidth/2,cy=window.innerHeight*0.4;
  if(anchor){var r=anchor.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;}
  for(var i=0;i<28;i++){
    var p=document.createElement('div');
    var sz=3+Math.random()*5;
    var dx=(Math.random()-0.5)*240;
    var dy=(-60-Math.random()*180);
    var dur=(0.7+Math.random()*0.9).toFixed(2);
    var gold=Math.random()>0.4?'#F2C94C':'#FDE68A';
    p.style.position='fixed';
    p.style.left=cx+'px';p.style.top=cy+'px';
    p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.borderRadius='50%';p.style.background=gold;
    p.style.pointerEvents='none';p.style.zIndex='9999';
    p.style.boxShadow='0 0 6px '+gold;
    p.style.animation='av-particle '+dur+'s ease-out forwards';
    p.style.setProperty('--dx',dx+'px');
    p.style.setProperty('--dy',dy+'px');
    document.body.appendChild(p);
    setTimeout(function(el){el.remove();},1900,p);
  }
}

}

function playBeep(type){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var osc=ctx.createOscillator();var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';
    if(type==='start'){osc.frequency.value=528;gain.gain.setValueAtTime(0,ctx.currentTime);gain.gain.linearRampToValueAtTime(0.1,ctx.currentTime+0.08);gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.35);}

    osc.start();osc.stop(ctx.currentTime+0.5);
  }catch(e){}
}

  btn.title='Press to speak — press again to stop';

  function setActive(on){
    active=on;
    btn.style.color=on?C.tl:'rgba(255,255,255,.4)';
    btn.style.borderColor=on?C.tb:'rgba(255,255,255,.15)';
    btn.style.background=on?'rgba(0,229,192,.1)':'transparent';
    btn.style.animation=on?'av-p 1s ease-in-out infinite':'';
    btn.textContent=on?'⏹':'🎤';
    btn.title=on?'Press to stop recording':'Press to speak';
  }

  function startRec(){
    finalText=inp.value||''; // preserve any existing text
    rec=new SR();
    rec.continuous=true;       // KEY FIX: keep recording through pauses
    rec.interimResults=true;
    rec.lang='en-US';
    rec.onstart=()=>{setActive(true);playBeep('start');};
    rec.onresult=e=>{
      // Accumulate final results — never delete on pause
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal){
          finalText+=e.results[i][0].transcript+' ';
        }else{
          interim+=e.results[i][0].transcript;
        }
      }
      inp.value=(finalText+interim).trim();
      inp.dispatchEvent(new Event('input'));
    };
    rec.onend=()=>{
      if(active){
        // Auto-restart if still active (browser timeout protection)
        try{rec.start();}catch(e){setActive(false);}
      }
    };
    rec.onerror=e=>{
      if(e.error==='no-speech')return; // ignore silence, keep going
      setActive(false);
      btn.textContent='🚫';
      setTimeout(()=>{btn.textContent='🎤';},2000);
    };
    try{rec.start();}catch(e){setActive(false);}
  }

  function stopRec(){
    setActive(false);
    playBeep('stop');
    try{rec.stop();}catch(e){}
    rec=null;
  }

  btn.addEventListener('click',()=>{
    if(active)stopRec();
    else startRec();
  });
  return btn;
}

function getApiKey(){
  try{
    var k=localStorage.getItem('aevora_api_key')||'';
    if(k)return k;
    // Fallback: restore from user object if localStorage was cleared
    if(S.user&&S.user.apiKey){
      localStorage.setItem('aevora_api_key',S.user.apiKey);
      return S.user.apiKey;
    }
    return '';
  }catch{return '';}
}
function saveApiKey(k){
  try{localStorage.setItem('aevora_api_key',k);}catch{}
  // Backup inside user object so it survives localStorage clears
  if(k&&S.user){S.user.apiKey=k;saveUser(S.user);}
}

async function ai(msgs,sys,retries=2,opts){
  const key=getApiKey();
  if(!key){showApiKeyPrompt();return'Please add your API key in Settings to enable AI features.';}
  for(let attempt=0;attempt<=retries;attempt++){
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':key,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:opts&&opts.tokens?opts.tokens:1000,
          system:sys||'You are Aevora, a compassionate AI companion.',
          messages:msgs
        })
      });
      if(!r.ok){
        const txt=await r.text();
        let errData={};try{errData=JSON.parse(txt);}catch(e){}
        if(errData.error&&errData.error.type==='authentication_error'){S._apiLastErr='auth_error';showApiKeyPrompt('Invalid API key. Please update it in Settings.');return '__ERR__:auth';}
        if(r.status===429&&attempt<retries){await new Promise(res=>setTimeout(res,1500*(attempt+1)));continue;}
        throw new Error('API error '+r.status+': '+txt.substring(0,80));
      }
      const d=await r.json();
      if(d.error){
        if(d.error.type==='authentication_error'){S._apiLastErr='auth_error';showApiKeyPrompt('Invalid API key. Please update it in Settings.');return '__ERR__:auth';}
        if(d.error.type==='overloaded_error'&&attempt<retries){await new Promise(res=>setTimeout(res,1200*(attempt+1)));continue;}
        S._apiLastErr='api:'+d.error.type+':'+d.error.message;throw new Error(d.error.message);
      }
      return d.content[0].text;
    }catch(e){
      S._apiLastErr='attempt '+attempt+': '+e.message;
      if(attempt<retries){await new Promise(res=>setTimeout(res,1200*(attempt+1)));continue;}
      return '__ERR__:'+e.message;
    }
  }
  return '__ERR__:exhausted';
}

    var dsStr='Decision style: '+S.prof.decisionStyle;

    if(S.prof.plValues&&S.prof.plValues.length)dsStr+=' | Core decision values: '+S.prof.plValues.join(', ');

    parts.push('[LIFE PURPOSE]\n'+bpStr);
  }
  // Session log — last 8 entries, skip same module to avoid echo
  if(S.log&&S.log.length){
    var logs=S.log.filter(function(l){return l.module!==moduleId;}).slice(0,8);
    if(logs.length){
      var logStr=logs.map(function(l){return '['+l.module+'] '+l.summary;}).join('\n');

  // Journal insights

  // Active data sources
  if(S.dataSources&&Object.keys(S.dataSources).length){
    var activeSrc=Object.entries(S.dataSources).filter(function(kv){return kv[1];}).map(function(kv){return kv[0];});
    if(activeSrc.length)parts.push('[CONNECTED DATA SOURCES]\n'+activeSrc.join(', ')+'\n(Use these to inform personalisation depth — user has granted access to these life data streams)');
  }
  if(!parts.length)return'';
  return'\n\n--- AEVORA CONTEXT ---\n'+parts.join('\n\n')+'\n--- END CONTEXT ---';
}


// Therapeutic voice — calm, slow, low pitch
function getTherapeuticVoice(){
  var voices=window.speechSynthesis.getVoices();
  if(!voices.length)return null;
  // Priority: warmest/calmest voices first
  var priority=['Ava','Aria','Jenny','Moira','Fiona','Samantha','Karen','Hazel',
    'Google UK English Female','Microsoft Zira','Google US English Female','en-GB'];
  for(var i=0;i<priority.length;i++){
    var match=voices.find(function(v){return v.name.includes(priority[i])&&v.lang.startsWith('en');});
    if(match)return match;
  }
  // Fallback: any English female voice
  var engF=voices.find(function(v){return v.lang.startsWith('en')&&v.name.toLowerCase().includes('female');});
  if(engF)return engF;
  // Fallback: any English voice
  return voices.find(function(v){return v.lang.startsWith('en');})||null;
}
function applyTherapeuticVoice(utt){
  utt.rate=(S.user&&S.user.voiceRate)||0.8;
  utt.pitch=(S.user&&S.user.voicePitch)||0.65;
  utt.volume=0.93;
  function setVoice(){
    var voices=window.speechSynthesis.getVoices();
    if(!voices.length)return;
    // Use saved preference first
    if(S.user&&S.user.voicePref){
      var saved=voices.find(function(v){return v.name===S.user.voicePref;});
      if(saved){utt.voice=saved;return;}
    }
    utt.voice=getTherapeuticVoice()||utt.voice;
  }
  setVoice();
  if(!utt.voice){
    window.speechSynthesis.addEventListener('voiceschanged',function once(){
      setVoice();
      window.speechSynthesis.removeEventListener('voiceschanged',once);
    },{once:true});
  }
  return utt;
}

    if(!name){errMsg.textContent='Please enter your name.';return;}
    if(!email||!email.includes('@')){errMsg.textContent='Please enter a valid email.';return;}
    // Email exists check
    const existingU=getUser();
    if(existingU&&existingU.email.toLowerCase()===email.toLowerCase()){errMsg.textContent='This email is already registered. Please sign in instead.';return;}

    const suStrength=checkPassStrength(pass);
    if(!suStrength.checks.length){errMsg.textContent='Password must be at least 8 characters.';return;}
    if(!suStrength.checks.upper){errMsg.textContent='Password must include at least one uppercase letter.';return;}
    if(!suStrength.checks.number){errMsg.textContent='Password must include at least one number.';return;}
    if(!suStrength.checks.symbol){errMsg.textContent='Password must include at least one symbol (!@#$%).';return;}
    // Confirm match
    const confirmVal=document.getElementById('su-confirm')?document.getElementById('su-confirm').value:'';

// ── MODAL SYSTEM
let activeModal=null;

function closeModal(){
  if(activeModal){activeModal.remove();activeModal=null;}
}

function mkModal(content, opts){
  opts=opts||{};
  closeModal();
  // Backdrop
  const backdrop=h('div',{css:{
    position:'fixed',inset:0,zIndex:'2000',
    background:'rgba(13,11,35,0.97)',
    display:'flex',flexDirection:'column',
    animation:'av-f .3s ease forwards',
    overflowY:'auto',
  }});
  backdrop.addEventListener('click',function(e){if(e.target===backdrop&&!opts.sticky)closeModal();});
  backdrop.appendChild(content);
  document.getElementById('av').appendChild(backdrop);
  activeModal=backdrop;
  return backdrop;
}

// ── COMING SOON MODAL
function showComingSoon(mod){
  const cfg=MOD_ICONS[mod.id];
  const col=cfg?cfg.col:(mod.cat==='mentor'?GOLD:TEAL);
  const details=MODULE_DETAILS[mod.id]||{};

  const box=h('div',{css:{
    maxWidth:'440px',width:'100%',margin:'auto',
    padding:'32px 24px',
    display:'flex',flexDirection:'column',alignItems:'center',
    minHeight:'100vh',justifyContent:'center',
  }});

  // Large icon
  const bigIcon=mkModIcon(mod.id);
  bigIcon.style.width='72px';bigIcon.style.height='72px';bigIcon.style.borderRadius='18px';
  bigIcon.style.marginBottom='20px';
  bigIcon.querySelector('svg').setAttribute('width','34');
  bigIcon.querySelector('svg').setAttribute('height','34');
  box.appendChild(bigIcon);



  // Title
  const title=h('h2',{css:{fontFamily:PF,fontSize:'24px',fontWeight:'700',color:'#F0EEF8',textAlign:'center',marginBottom:'8px'}});
  title.textContent=mod.name;box.appendChild(title);

  // Description
  const desc=h('p',{css:{fontFamily:CR,fontSize:'15px',color:'#9B94BC',textAlign:'center',lineHeight:'1.7',marginBottom:'24px',maxWidth:'320px'}});
  desc.textContent=mod.desc;box.appendChild(desc);

  // Weaving message
  const weavingCard=h('div',{css:{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'12px',padding:'16px',marginBottom:'24px',width:'100%',textAlign:'center'}});
  const wIco=h('p',{css:{fontSize:'24px',marginBottom:'8px'}});wIco.textContent='🌌';
  const wMsg=h('p',{css:{fontFamily:PF,fontStyle:'italic',fontSize:'15px',color:'rgba(255,255,255,.6)',lineHeight:'1.6'}});
  wMsg.textContent='This module is being woven into existence. Your patience is part of the journey.';
  weavingCard.appendChild(wIco);weavingCard.appendChild(wMsg);
  box.appendChild(weavingCard);

  // What it will do card
  if(details.concept){
    const infoCard=h('div',{css:{background:'linear-gradient(145deg,rgba(26,16,48,0.95),rgba(13,11,35,0.98))',border:'1px solid '+col+'20',borderRadius:'12px',padding:'16px',marginBottom:'24px',width:'100%'}});
    const infoTitle=h('p',{css:{fontFamily:CR,fontSize:'11px',letterSpacing:'.15em',textTransform:'uppercase',color:col,marginBottom:'10px'}});infoTitle.textContent='What it will do';
    const infoConcept=h('p',{css:{fontFamily:CR,fontSize:'14px',color:'rgba(255,255,255,.75)',lineHeight:'1.65'}});
    infoConcept.textContent=details.concept;
    infoCard.appendChild(infoTitle);infoCard.appendChild(infoConcept);
    box.appendChild(infoCard);
  }

  // Close button
  const closeBtn=h('button',{cls:'av-btn',css:{width:'100%',padding:'13px',borderColor:col+'40',color:col},on:{click:closeModal}});
  closeBtn.textContent='← Return to Inner Universe';
  box.appendChild(closeBtn);

  mkModal(box);
}

const DISTRESS_SIGNALS=[
  'i feel so alone','completely alone','nobody cares','no one cares',
  'feeling hopeless','feel hopeless','no hope','lost all hope',
  'cant cope',"can't cope",'falling apart','breaking down',
  'completely worthless','feel worthless','hate myself',
  'чувствую себя одиноким','никому не нужен','нет надежды','ненавижу себя',
  'tamamilə tənhayam','heç kimə lazım deyiləm','ümidsizlik',
];

function checkCrisis(text){
  if(!text)return{crisis:false,distress:false};
  const lower=text.toLowerCase();
  const crisis=CRISIS_KEYWORDS.some(function(kw){return lower.includes(kw);});
  const distress=!crisis&&DISTRESS_SIGNALS.some(function(kw){return lower.includes(kw);});
  return{crisis,distress};
}

const SAFETY_PROMPT=`
SAFETY GUARDRAILS — MANDATORY — READ BEFORE RESPONDING:

1. CRISIS DETECTION: If the user expresses any suicidal ideation, self-harm intent, or statements suggesting they may hurt themselves, STOP your regular response immediately. Respond ONLY with: genuine compassion, validation of their feelings, and a clear statement that professional support is available. Never attempt to "solve" or "reframe" a crisis — simply acknowledge and encourage them to contact a local crisis helpline or emergency services.

2. NOT A THERAPIST: You are an AI companion, not a licensed therapist, psychologist, or medical professional. Never diagnose, prescribe, or recommend specific treatments. For clinical concerns, always encourage professional help.

3. NO FABRICATION: Never invent biographical facts, memories, or details about the user that were not explicitly shared. Every insight must be grounded in what the user has actually told you.

4. NO HARMFUL CONTENT: Never produce content that encourages self-harm, harmful relationships, substance abuse, eating disorders, or any behaviour that could endanger the user.

5. GROUNDING: If a user seems distressed but not in crisis, gently offer a grounding moment before continuing. Examples: breathing exercises, noticing the present moment, gentle redirection.

6. AI TRANSPARENCY: Never claim to be human. If directly asked, clearly state you are an AI.

7. TONE: Always warm, wise, and empowering. Never clinical, cold, or dismissive. The user's emotional experience is always valid.

8. SCOPE: You are here to support reflection, self-discovery, and emotional exploration — not to replace human connection, professional therapy, or medical care.

// ── Safe AI Wrapper — adds safety prompt + crisis detection
async function safeAI(msgs, sys, onCrisis){
  // Scan last user message for crisis signals
  const lastMsg=msgs.filter(function(m){return m.role==='user';}).pop();
  if(lastMsg){
    const check=checkCrisis(lastMsg.content);
    if(check.crisis){
      showCrisisModal(onCrisis);
      return null; // Don't call AI during crisis — surface resources first

  }
  // Prepend safety instructions to system prompt
  const safeSystem=SAFETY_PROMPT+'\n\n---\n\n'+sys;
  return ai(msgs, safeSystem);
}

// ── LISTEN BUTTON — global, robust TTS
function mkListenBtn(getText){
  var active=false;
  var btn=h('button',{cls:'av-btn',css:{display:'flex',alignItems:'center',gap:'6px',padding:'7px 14px',fontSize:'13px',borderColor:C.tb,color:C.tl,flexShrink:'0'}});

  function setPlaying(){active=true;btn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="'+GOLD+'" stroke="none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span>Stop</span>';btn.style.color=GOLD;}
  setIdle();
  btn.addEventListener('click',function(){
    if(!window.speechSynthesis){btn.textContent='Not supported';return;}
    if(active){window.speechSynthesis.cancel();setIdle();return;}
    var text=getText();if(!text||!text.trim())return;
    window.speechSynthesis.cancel();
    // Small delay so cancel clears properly
    setTimeout(function(){
      var utt=new SpeechSynthesisUtterance(text);
      utt.rate=0.8;utt.pitch=0.65;utt.volume=1;utt.lang='en-US';
      // Try to pick a good voice if available
      var voices=window.speechSynthesis.getVoices();
      if(voices.length>0){
        var pref=voices.find(function(v){return v.lang==='en-US'&&v.name.toLowerCase().includes('female');})
          ||voices.find(function(v){return v.lang==='en-US';})
          ||voices.find(function(v){return v.lang&&v.lang.startsWith('en');});
        if(pref)utt.voice=pref;
      }
      utt.onstart=setPlaying;
      utt.onend=setIdle;
      utt.onerror=setIdle;
      // Chrome mobile fix: resume first
      window.speechSynthesis.resume();
      window.speechSynthesis.speak(utt);
      setPlaying();
    },80);
  });
  return btn;
}

function showPhotoCropModal(file, onCropped){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      closeModal();
      const backdrop=h('div',{css:{position:'fixed',inset:0,zIndex:'3000',background:'rgba(0,0,0,.96)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px',overflowY:'auto'}});
      document.getElementById('av').appendChild(backdrop);
      activeModal=backdrop;

      const maxW=Math.min(360,window.innerWidth-40);
      const ratio=img.height/img.width;
      const canvasW=maxW;
      const canvasH=Math.min(canvasW*ratio,380);
      const scaleX=img.width/canvasW;
      const scaleY=img.height/canvasH;

      const canvas=document.createElement('canvas');
      canvas.width=canvasW;canvas.height=canvasH;
      canvas.style.cssText='display:block;border-radius:10px;cursor:crosshair;touch-action:none;max-width:100%;';
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvasW,canvasH);

      var crop={x:0,y:0,w:canvasW,h:canvasH};
      var dragging=false,sx=0,sy=0;

      function draw(){
        ctx.clearRect(0,0,canvasW,canvasH);
        ctx.drawImage(img,0,0,canvasW,canvasH);
        ctx.fillStyle='rgba(0,0,0,.55)';
        ctx.fillRect(0,0,canvasW,canvasH);
        if(crop.w>4&&crop.h>4){
          ctx.clearRect(crop.x,crop.y,crop.w,crop.h);
          ctx.drawImage(img,crop.x*scaleX,crop.y*scaleY,crop.w*scaleX,crop.h*scaleY,crop.x,crop.y,crop.w,crop.h);
          ctx.strokeStyle='#00E5C0';ctx.lineWidth=2;
          ctx.strokeRect(crop.x,crop.y,crop.w,crop.h);
          // Corner handles
          var hs=8;
          [[crop.x,crop.y],[crop.x+crop.w-hs,crop.y],[crop.x,crop.y+crop.h-hs],[crop.x+crop.w-hs,crop.y+crop.h-hs]].forEach(function(pt){
            ctx.fillStyle='#00E5C0';ctx.fillRect(pt[0],pt[1],hs,hs);
          });
        }
      }
      draw();

      function getPos(e){
        var r=canvas.getBoundingClientRect();
        var cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
        var cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
        return{x:Math.max(0,Math.min(cx,canvasW)),y:Math.max(0,Math.min(cy,canvasH))};
      }
      canvas.addEventListener('mousedown',function(e){var p=getPos(e);sx=p.x;sy=p.y;dragging=true;});
      canvas.addEventListener('mousemove',function(e){if(!dragging)return;var p=getPos(e);crop={x:Math.min(sx,p.x),y:Math.min(sy,p.y),w:Math.abs(p.x-sx),h:Math.abs(p.y-sy)};draw();});
      canvas.addEventListener('mouseup',function(){dragging=false;});
      canvas.addEventListener('touchstart',function(e){e.preventDefault();var p=getPos(e);sx=p.x;sy=p.y;dragging=true;},{passive:false});
      canvas.addEventListener('touchmove',function(e){e.preventDefault();if(!dragging)return;var p=getPos(e);crop={x:Math.min(sx,p.x),y:Math.min(sy,p.y),w:Math.abs(p.x-sx),h:Math.abs(p.y-sy)};draw();},{passive:false});
      canvas.addEventListener('touchend',function(){dragging=false;});

      var hdr=h('div',{css:{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',maxWidth:canvasW+'px',marginBottom:'12px'}});
      var htxt=h('p',{css:{fontFamily:CR,fontSize:'13px',color:'rgba(255,255,255,.6)'}});htxt.textContent='Drag to select your face or full body';
      var hx=h('button',{css:{background:'none',border:'none',color:'rgba(255,255,255,.4)',fontSize:'22px',cursor:'pointer',lineHeight:'1'},on:{click:closeModal}});hx.textContent='×';
      hdr.appendChild(htxt);hdr.appendChild(hx);
      backdrop.appendChild(hdr);
      backdrop.appendChild(canvas);

      var btns=h('div',{css:{display:'flex',gap:'10px',marginTop:'14px',width:'100%',maxWidth:canvasW+'px'}});
      var cancelB=h('button',{cls:'av-btn',css:{flex:'1',padding:'11px'},on:{click:closeModal}});cancelB.textContent='Cancel';
      var useB=h('button',{css:{flex:'1',padding:'11px',background:'linear-gradient(135deg,'+TEAL+',#00B4A0)',border:'none',borderRadius:'10px',color:'#0D0B1A',fontFamily:PF,fontWeight:'700',fontSize:'14px',cursor:'pointer',transition:'all .2s'},on:{click:function(){
        var out=document.createElement('canvas');
        var size=400;out.width=size;out.height=size;
        var oc=out.getContext('2d');
        var cw=crop.w>4?crop.w:canvasW;
        var ch=crop.h>4?crop.h:canvasH;
        oc.drawImage(img,crop.x*scaleX,crop.y*scaleY,cw*scaleX,ch*scaleY,0,0,size,size);
        closeModal();
        onCropped(out.toDataURL('image/jpeg',0.82));
      }}});useB.textContent='Use this photo';
      btns.appendChild(cancelB);btns.appendChild(useB);
      backdrop.appendChild(btns);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── JOURNAL STORAGE HELPERS
function getJournalEntries(){try{return JSON.parse(localStorage.getItem('aevora_journal')||'[]');}catch{return[];}}
function getWritingStreak(){
  var entries=getJournalEntries();
  if(!entries.length)return 0;
  var days=new Set(entries.map(function(e){return new Date(e.ts).toDateString();}));
  var streak=0;
  var d=new Date();
  // Check today first, if not written today start from yesterday
  if(!days.has(d.toDateString()))d.setDate(d.getDate()-1);
  while(days.has(d.toDateString())){streak++;d.setDate(d.getDate()-1);}
  return streak;
}
function hasWrittenToday(){
  var entries=getJournalEntries();
  var today=new Date().toDateString();
  return entries.some(function(e){return new Date(e.ts).toDateString()===today;});
}
function saveJournalEntry(entry){
  try{
    const entries=getJournalEntries();
    entries.unshift(entry);
    if(entries.length>200)entries.length=200;
    localStorage.setItem('aevora_journal',JSON.stringify(entries));
    // Back up all entries in user object (not just 50)
    if(S.user){S.user.journalEntries=entries.slice(0,200);saveUser(S.user);}
  }catch{}
  // Offline queue — entry is saved locally, will sync when backend is available
  if(!navigator.onLine){
    try{var q=JSON.parse(localStorage.getItem('aevora_offline_queue')||'[]');q.push({type:'journal',entry:entry,ts:Date.now()});localStorage.setItem('aevora_offline_queue',JSON.stringify(q));}catch(e){}
  }
  logSession('journal','Journal entry: '+(entry.text||'').substring(0,100),['journal'],{});
}
// Sync offline queue when back online
window.addEventListener('online',function(){
  try{var q=JSON.parse(localStorage.getItem('aevora_offline_queue')||'[]');if(q.length){localStorage.removeItem('aevora_offline_queue');console.log('Aevora: '+q.length+' offline entries ready to sync');}}catch(e){}
});
function fmtJournalDate(ts){
  const d=new Date(ts);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()]+' · '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

  function mkRadarChart(traits){

    function pt(a,radius){return{x:cx+radius*Math.cos(a),y:cy+radius*Math.sin(a)};}
    function ptStr(a,radius){const p=pt(a,radius);return p.x+','+p.y;}
    let svg='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="display:block;margin:0 auto">';
    [0.25,0.5,0.75,1].forEach(function(f){
      svg+='<polygon points="'+angles.map(function(a){return ptStr(a,r*f);}).join(' ')+'" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>';
    });
    angles.forEach(function(a){const end=pt(a,r);svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+end.x+'" y2="'+end.y+'" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>';});

    vals.forEach(function(v,i){
      const p=pt(angles[i],r*v);

      const lp=pt(angles[i],r*v+14);
      svg+='<text x="'+lp.x+'" y="'+lp.y+'" text-anchor="middle" dominant-baseline="middle" fill="'+TEAL+'" font-size="9" font-family="Satoshi,Inter,sans-serif">'+Math.round(v*100)+'%</text>';
    });
    dim.forEach(function(label,i){
      const lp=pt(angles[i],r+26);
      svg+='<text x="'+lp.x+'" y="'+lp.y+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,0.6)" font-size="10" font-family="Satoshi,Inter,sans-serif">'+label+'</text>';

// ── PASSWORD STRENGTH
function checkPassStrength(pass){
  var checks={length:pass.length>=8,upper:/[A-Z]/.test(pass),lower:/[a-z]/.test(pass),number:/[0-9]/.test(pass),symbol:/[^A-Za-z0-9]/.test(pass)};
  var score=Object.values(checks).filter(Boolean).length;
  return{score:score,checks:checks};
}
function mkPassStrength(){
  var wrap=h('div',{css:{marginBottom:'8px',marginTop:'-8px'}});
  var barRow=h('div',{css:{display:'flex',gap:'4px',marginBottom:'4px'}});
  var bars=[];
  for(var i=0;i<5;i++){var bar=h('div',{css:{flex:'1',height:'3px',borderRadius:'3px',background:'rgba(255,255,255,.08)',transition:'background .25s'}});bars.push(bar);barRow.appendChild(bar);}
  var reqRow=h('div',{css:{display:'flex',flexWrap:'wrap',gap:'4px 10px',marginBottom:'4px'}});
  var reqs=[{key:'length',label:'8+ chars'},{key:'upper',label:'Uppercase'},{key:'lower',label:'Lowercase'},{key:'number',label:'Number'},{key:'symbol',label:'Symbol'}];
  var reqEls={};
  reqs.forEach(function(r){
    var el=h('span',{css:{fontFamily:CR,fontSize:'11px',color:'rgba(255,255,255,.3)',transition:'color .2s'}});
    el.textContent='○ '+r.label;reqEls[r.key]=el;reqRow.appendChild(el);
  });
  wrap.appendChild(barRow);wrap.appendChild(reqRow);
  var COLORS=['#EF4444','#F97316','#EAB308','#84CC16','#22C55E'];
  wrap.update=function(pass){
    var res=checkPassStrength(pass);
    bars.forEach(function(b,i){b.style.background=i<res.score?COLORS[res.score-1]:'rgba(255,255,255,.08)';});
    reqs.forEach(function(r){var ok=res.checks[r.key];reqEls[r.key].style.color=ok?'#22C55E':'rgba(255,255,255,.3)';reqEls[r.key].textContent=(ok?'✓ ':'○ ')+r.label;});
  };
  return wrap;
}

// ── BIOMETRIC HELPERS
var BIOMETRIC_CRED_KEY='aevora_biometric_v1';
function biometricAvailable(){return!!(window.PublicKeyCredential&&navigator.credentials&&window.crypto&&window.crypto.subtle);}
function getBiometricCred(){try{return JSON.parse(localStorage.getItem(BIOMETRIC_CRED_KEY)||'null');}catch(e){return null;}}
function ab2b64(buf){var bytes=new Uint8Array(buf);var s='';bytes.forEach(function(b){s+=String.fromCharCode(b);});return btoa(s);}
function b642ab(s){var bin=atob(s);var buf=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);return buf.buffer;}
async function setupBiometric(user){
  if(!biometricAvailable())return false;
  try{
    var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    var cred=await navigator.credentials.create({publicKey:{challenge:challenge,rp:{name:'Aevora',id:window.location.hostname},user:{id:new TextEncoder().encode(user.email),name:user.email,displayName:user.fullName||user.name},pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],authenticatorSelection:{userVerification:'required',residentKey:'preferred'},timeout:60000}});
    localStorage.setItem(BIOMETRIC_CRED_KEY,JSON.stringify({id:ab2b64(cred.rawId),email:user.email}));
    return true;
  }catch(e){return false;}
}
async function loginWithBiometric(){
  var stored=getBiometricCred();
  if(!stored||!biometricAvailable())return null;
  try{
    var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    await navigator.credentials.get({publicKey:{challenge:challenge,allowCredentials:[{id:b642ab(stored.id),type:'public-key'}],userVerification:'required',timeout:60000}});
    return stored.email;
  }catch(e){return null;}
}

function mkArcGauge(score,col){

  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','100');svg.setAttribute('height','60');svg.setAttribute('viewBox','0 0 100 66');

  var fg=document.createElementNS('http://www.w3.org/2000/svg','path');

//  TAB BAR WITH INLINE DESCRIPTION
// ══════════════════════════════════════════════════════
function mkTabBar(tabs, activeIdx, onChange, activeCol, sideEl){
  activeCol=activeCol||null;
  const activeBg=activeCol?activeCol+'20':'rgba(255,255,255,.09)';
  const activeText=activeCol||'#F0EEF8';
  const activeBorder=activeCol?'1px solid '+activeCol+'50':'none';
  const wrap=h('div',{css:{marginBottom:'24px'}});
  const btnRow=h('div',{css:{display:'flex',gap:'0',background:'rgba(255,255,255,.04)',borderRadius:'12px',padding:'4px',marginBottom:'12px'}});
  const descArea=h('div',{css:{padding:'0 2px'}});

  function updateDesc(idx){
    descArea.innerHTML='';
    const dRow=h('div',{css:{display:'flex',alignItems:'flex-start',gap:'8px'}});
    const d=h('p',{cls:'av-f',css:{fontFamily:CR,fontSize:'13px',color:'rgba(255,255,255,.45)',lineHeight:'1.6',flex:'1'}});
    d.textContent=tabs[idx].desc;
    dRow.appendChild(d);
    // Re-append the side element (e.g. info button) every time
    if(sideEl)dRow.appendChild(sideEl);
    descArea.appendChild(dRow);
  }

  tabs.forEach(function(tab,i){
    const isActive=i===activeIdx;
    const btn=h('button',{css:{
      flex:'1',padding:'9px 8px',borderRadius:'9px',border:isActive?activeBorder:'none',
      background:isActive?activeBg:'transparent',
      color:isActive?activeText:'rgba(255,255,255,.4)',
      fontFamily:CR,fontSize:'13px',fontWeight:isActive?'600':'400',
      cursor:'pointer',transition:'all .2s',
    },on:{click:function(){
      btnRow.querySelectorAll('button').forEach(function(b,bi){
        b.style.background=bi===i?activeBg:'transparent';
        b.style.color=bi===i?activeText:'rgba(255,255,255,.4)';
        b.style.fontWeight=bi===i?'600':'400';
        b.style.border=bi===i?activeBorder:'none';
      });
      updateDesc(i);
      onChange(i);
    }}});
    btn.textContent=tab.label;
    btnRow.appendChild(btn);
  });

  updateDesc(activeIdx);
  wrap.appendChild(btnRow);
  wrap.appendChild(descArea);
  return wrap;
}

function getMoonPhase(){
  var knownNew=new Date(2000,0,6);
  var days=(new Date()-knownNew)/(1000*60*60*24);
  var phase=(days%29.53)/29.53;
  var today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long'});
  if(phase<0.03||phase>0.97)return{name:'New Moon',ico:'\uD83C\uDF11',date:today,meaning:'What this means for your dreams tonight: New Moon nights tend to bring fewer or quieter dreams. If you dream, write it down \u2014 sparse dreams at this phase often carry more symbolic weight.',intensity:'Low'};
  if(phase<0.25)return{name:'Waxing Crescent',ico:'\uD83C\uDF12',date:today,meaning:'What this means for your dreams tonight: The moon is growing. Dreams at this phase often carry themes of possibility and forward movement \u2014 beginnings that have not yet taken shape.',intensity:'Building'};
  if(phase<0.27)return{name:'First Quarter',ico:'\uD83C\uDF13',date:today,meaning:'What this means for your dreams tonight: A moon of tension and decision. Dreams may present crossroads or dilemmas that mirror something unresolved in your waking life.',intensity:'Moderate'};
  if(phase<0.50)return{name:'Waxing Gibbous',ico:'\uD83C\uDF14',date:today,meaning:'What this means for your dreams tonight: The moon is nearly full. Dreams tend to be more vivid and emotionally intense right now. Good time to log carefully.',intensity:'High'};
  if(phase<0.53)return{name:'Full Moon',ico:'\uD83C\uDF15',date:today,meaning:'What this means for your dreams tonight: Peak dream intensity. Many people report their most vivid and revealing dreams at Full Moon. If you ever dream clearly \u2014 it may be tonight.',intensity:'Peak'};
  if(phase<0.75)return{name:'Waning Gibbous',ico:'\uD83C\uDF16',date:today,meaning:'What this means for your dreams tonight: The moon is releasing its fullness. Dreams at this phase tend to process recent events \u2014 unfinished emotional business surfacing to be resolved.',intensity:'High'};
  if(phase<0.77)return{name:'Last Quarter',ico:'\uD83C\uDF17',date:today,meaning:'What this means for your dreams tonight: A moon of letting go. Dreams often surface what you are ready to release \u2014 old beliefs, old resentments, things that no longer fit.',intensity:'Moderate'};
  return{name:'Waning Crescent',ico:'\uD83C\uDF18',date:today,meaning:'What this means for your dreams tonight: The quietest phase. Dreams are deep, slow, and symbolic. The mind is preparing for a new cycle. Rest and listen.',intensity:'Low'};
}

  async function raSend(){

  async function sendOpeningMsg(){

  async function exitRoleplay(){
