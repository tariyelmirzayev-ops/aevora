function h(t,p,...c){
  const e=document.createElement(t);
  if(p)for(const[k,v]of Object.entries(p)){
    if(k==='css')Object.assign(e.style,v);
    else if(k==='cls')e.className=v;
    else if(k==='on')Object.entries(v).forEach(([n,f])=>e.addEventListener(n,f));
    else e[k]=v;
  }
  for(const x of c.flat()){
    if(x==null)continue;
    e.appendChild(typeof x==='string'?document.createTextNode(x):x);
  }
  return e;
}

// Audio beep for mic start/stop
function playBeep(freq,dur,vol=0.25){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=freq;osc.type='sine';
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start();osc.stop(ctx.currentTime+dur);
  }catch(e){}
}

function mkMic(inp){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  let rec=null,active=false,finalText='';

  const btn=h('button',{cls:'av-btn',css:{flexShrink:'0',padding:'12px 14px',fontSize:'16px',borderColor:'rgba(255,255,255,.15)',color:'rgba(255,255,255,.4)',position:'relative'}});
  btn.textContent='🎤';
  btn.title='Press to speak — press again to stop';

  function setActive(on){
    active=on;
    btn.style.color=on?C.tl:'rgba(255,255,255,.4)';
    btn.style.borderColor=on?C.tb:'rgba(255,255,255,.15)';
    btn.style.background=on?'rgba(0,229,192,.1)':'transparent';
    btn.style.animation=on?'av-p 1s ease-in-out infinite':'';
    btn.textContent=on?'⏹':'🎤';
    btn.title=on?'Press to stop recording':'Press to speak';
  }

  function startRec(){
    finalText=inp.value||''; // preserve any existing text
    rec=new SR();
    rec.continuous=true;       // KEY FIX: keep recording through pauses
    rec.interimResults=true;
    rec.lang='en-US';
    rec.onstart=()=>{setActive(true);playBeep(880,0.15);};
    rec.onresult=e=>{
      // Accumulate final results — never delete on pause
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal){
          finalText+=e.results[i][0].transcript+' ';
        }else{
          interim+=e.results[i][0].transcript;
        }
      }
      inp.value=(finalText+interim).trim();
      inp.dispatchEvent(new Event('input'));
    };
    rec.onend=()=>{
      if(active){
        // Auto-restart if still active (browser timeout protection)
        try{rec.start();}catch(e){setActive(false);}
      }
    };
    rec.onerror=e=>{
      if(e.error==='no-speech')return; // ignore silence, keep going
      setActive(false);
      btn.textContent='🚫';
      setTimeout(()=>{btn.textContent='🎤';},2000);
    };
    try{rec.start();}catch(e){setActive(false);}
  }

  function stopRec(){
    setActive(false);
    playBeep(440,0.2);
    try{rec.stop();}catch(e){}
    rec=null;
  }

  btn.addEventListener('click',()=>{
    if(active)stopRec();
    else startRec();
  });
  return btn;
}

function getApiKey(){try{return localStorage.getItem('aevora_api_key')||'';}catch{return '';}}
function saveApiKey(k){try{localStorage.setItem('aevora_api_key',k);}catch{}}

async function ai(msgs,sys,retries=2){
  const key=getApiKey();
  if(!key){showApiKeyPrompt();return'Please add your API key in Settings → API Key to enable AI features.';}
  for(let attempt=0;attempt<=retries;attempt++){
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-calls':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:msgs})});
      const d=await r.json();
      if(d.error){
        if(d.error.type==='authentication_error'){showApiKeyPrompt('Invalid API key. Please update it in Settings.');return null;}
        if(d.error.type==='overloaded_error'&&attempt<retries){await new Promise(res=>setTimeout(res,1200*(attempt+1)));continue;}
        throw new Error(d.error.message);
      }
      return d.content[0].text;
    }catch(e){
      if(attempt<retries){await new Promise(res=>setTimeout(res,1200*(attempt+1)));continue;}
      console.error(e);return null;
    }
  }
  return null;
}

// ── AUTH HELPERS
function getUser(){
  try{return JSON.parse(localStorage.getItem('aevora_user')||'null');}catch{return null;}
}
function saveUser(u){
  try{localStorage.setItem('aevora_user',JSON.stringify(u));}catch{}
}
function logout(){
  try{localStorage.removeItem('aevora_user');}catch{}
  S.user=null; S.prof=null; S.e1={msgs:[],cnt:0,done:false}; S.e2={idx:0,ans:{},val:''};
  S.th={msgs:[{r:'a',t:"Welcome to your sanctuary. I'm here to hold space for whatever arises within you. What calls to be witnessed today?"}]};
  S.pl={step:'input',d:'',a:'',y:'10',res:null,detail:null};
  S.onboarded=false;
  go('welcome');
}

// ── INPUT FIELD HELPER
function mkAuthInput(type, placeholder, id){
  const wrap=h('div',{css:{position:'relative',marginBottom:'16px'}});
  const inp=h('input',{id:id,type:type==='password'?'password':'text',placeholder:placeholder,css:{
    width:'100%',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.12)',
    borderRadius:'10px',color:'#F0EEF8',padding:'14px 16px',fontFamily:CR,fontSize:'16px',
    outline:'none',transition:'all .25s',
  }});
  try{inp.setAttribute('autocomplete', type==='password'?'current-password':type==='email'?'email':'name');}catch(e){}
  inp.addEventListener('focus',function(){inp.style.borderColor=TEAL;inp.style.background='rgba(0,229,192,.06)';});
  inp.addEventListener('blur',function(){inp.style.borderColor='rgba(255,255,255,.12)';inp.style.background='rgba(255,255,255,.05)';});
  // Placeholder color via CSS class
  inp.className='av-in';
  wrap.appendChild(inp);
  // Show/hide for password
  if(type==='password'){
    const eye=h('button',{css:{position:'absolute',right:'14px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,.35)',fontSize:'16px',padding:'4px'}});
    eye.textContent='👁';
    eye.addEventListener('click',function(){
      const show=inp.type==='password';
      inp.type=show?'text':'password';
      eye.style.opacity=show?'1':'.35';
    });
    wrap.appendChild(eye);
    inp.style.paddingRight='44px';
  }
  return wrap;
}

// ── MODAL SYSTEM
let activeModal=null;

function closeModal(){
  if(activeModal){activeModal.remove();activeModal=null;}
}

function mkModal(content, opts){
  opts=opts||{};
  closeModal();
  // Backdrop
  const backdrop=h('div',{css:{
    position:'fixed',inset:0,zIndex:'2000',
    background:'rgba(13,11,35,0.97)',
    display:'flex',flexDirection:'column',
    animation:'av-f .3s ease forwards',
    overflowY:'auto',
  }});
  backdrop.addEventListener('click',function(e){if(e.target===backdrop&&!opts.sticky)closeModal();});
  backdrop.appendChild(content);
  document.getElementById('av').appendChild(backdrop);
  activeModal=backdrop;
  return backdrop;
}

// ── COMING SOON MODAL
function showComingSoon(mod){
  const cfg=MOD_ICONS[mod.id];
  const col=cfg?cfg.col:(mod.cat==='mentor'?GOLD:TEAL);
  const details=MODULE_DETAILS[mod.id]||{};

  const box=h('div',{css:{
    maxWidth:'440px',width:'100%',margin:'auto',
    padding:'32px 24px',
    display:'flex',flexDirection:'column',alignItems:'center',
    minHeight:'100vh',justifyContent:'center',
  }});

  // Large icon
  const bigIcon=mkModIcon(mod.id);
  bigIcon.style.width='72px';bigIcon.style.height='72px';bigIcon.style.borderRadius='18px';
  bigIcon.style.marginBottom='20px';
  bigIcon.querySelector('svg').setAttribute('width','34');
  bigIcon.querySelector('svg').setAttribute('height','34');
  box.appendChild(bigIcon);



  // Title
  const title=h('h2',{css:{fontFamily:PF,fontSize:'24px',fontWeight:'700',color:'#F0EEF8',textAlign:'center',marginBottom:'8px'}});
  title.textContent=mod.name;box.appendChild(title);

  // Description
  const desc=h('p',{css:{fontFamily:CR,fontSize:'15px',color:'#9B94BC',textAlign:'center',lineHeight:'1.7',marginBottom:'24px',maxWidth:'320px'}});
  desc.textContent=mod.desc;box.appendChild(desc);

  // Weaving message
  const weavingCard=h('div',{css:{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'12px',padding:'16px',marginBottom:'24px',width:'100%',textAlign:'center'}});
  const wIco=h('p',{css:{fontSize:'24px',marginBottom:'8px'}});wIco.textContent='🌌';
  const wMsg=h('p',{css:{fontFamily:PF,fontStyle:'italic',fontSize:'15px',color:'rgba(255,255,255,.6)',lineHeight:'1.6'}});
  wMsg.textContent='This module is being woven into existence. Your patience is part of the journey.';
  weavingCard.appendChild(wIco);weavingCard.appendChild(wMsg);
  box.appendChild(weavingCard);

  // What it will do card

// ── Crisis Detection Keywords (EN / RU / AZ)
const CRISIS_KEYWORDS=[
  // English — suicidal ideation
  'suicide','suicidal','kill myself','end my life','take my life','want to die',
  'dont want to live',"don't want to live",'no reason to live','not worth living',
  'better off dead','end it all','cant go on',"can't go on",'give up on life',
  'hurt myself','harm myself','self harm','selfharm','cut myself','cutting myself',
  'overdose','end the pain','no way out','disappear forever','everyone would be better',
  // English — severe distress
  'i want to disappear','nothing matters anymore','completely hopeless','utterly hopeless',
  'no point in living','life is not worth','feel like dying',
  // Russian
  'хочу умереть','убить себя','покончить с собой','суицид','суицидальн',
  'нет смысла жить','жить не хочу','причинить себе вред','порезать себя',
  'лучше бы меня не было','все было бы лучше без меня','не хочу больше жить',
  'конец жизни','жизнь не имеет смысла','хочу исчезнуть',
  // Azerbaijani
  'özümü öldürmək','intihar','yaşamaq istəmirəm','həyata son vermək',
  'özümə zərər vermək','ölmək istəyirəm','yaşamağın mənası yoxdur',
  'hamı mənsiz daha yaxşı olar','itib getmək istəyirəm',
];

// ── Distress Signals (softer — trigger additional support, not full crisis)
const DISTRESS_SIGNALS=[
  'i feel so alone','completely alone','nobody cares','no one cares',
  'feeling hopeless','feel hopeless','no hope','lost all hope',
  'cant cope',"can't cope",'falling apart','breaking down',
  'completely worthless','feel worthless','hate myself',
  'чувствую себя одиноким','никому не нужен','нет надежды','ненавижу себя',
  'tamamilə tənhayam','heç kimə lazım deyiləm','ümidsizlik',
];

function checkCrisis(text){
  if(!text)return{crisis:false,distress:false};
  const lower=text.toLowerCase();
  const crisis=CRISIS_KEYWORDS.some(function(kw){return lower.includes(kw);});
  const distress=!crisis&&DISTRESS_SIGNALS.some(function(kw){return lower.includes(kw);});
  return{crisis,distress};
}

// ── Safe AI Wrapper — adds safety prompt + crisis detection
async function safeAI(msgs, sys, onCrisis){
  // Scan last user message for crisis signals
  const lastMsg=msgs.filter(function(m){return m.role==='user';}).pop();
  if(lastMsg){
    const check=checkCrisis(lastMsg.content);
    if(check.crisis){
      showCrisisModal(onCrisis);
      return null; // Don't call AI during crisis — surface resources first
    }
  }
  // Prepend safety instructions to system prompt
  const safeSystem=SAFETY_PROMPT+'\n\n---\n\n'+sys;
  return ai(msgs, safeSystem);
}

  const orbCore=h('div',{css:{width:'70px',height:'70px',borderRadius:'50%',background:'radial-gradient(circle,rgba(0,229,192,.3),transparent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px',transition:'all .4s'}});

  orbArea.appendChild(stateLabel);orbArea.appendChild(stateHint);
  w.appendChild(orbArea);

  // Transcript area - last 3 exchanges
  const transcript=h('div',{css:{width:'100%',maxWidth:'400px',padding:'0 24px',position:'relative',zIndex:'1',marginBottom:'32px',maxHeight:'200px',overflowY:'auto'}});

  const stopBtn=h('button',{css:{position:'relative',zIndex:'1',background:'rgba(255,0,80,.15)',border:'1px solid rgba(255,0,80,.4)',color:'rgba(255,100,100,.9)',fontFamily:CR,fontSize:'14px',padding:'12px 32px',borderRadius:'3px',cursor:'pointer',letterSpacing:'.08em',transition:'all .2s'}});

  function updateOrb(s){
    const states={
      idle:{color:'rgba(255,255,255,.3)',anim:'',label:'Tap to begin',hint:'',icon:'◎'},
      listening:{color:C.tl,anim:'av-p 1.2s ease-in-out infinite',label:'Listening...',hint:'Speak freely. I am here.',icon:'◎'},
      processing:{color:C.gd,anim:'av-p 0.8s ease-in-out infinite',label:'Thinking...',hint:'',icon:'◈'},
      speaking:{color:'#A78BFA',anim:'av-p 1.5s ease-in-out infinite',label:'Speaking...',hint:'',icon:'◎'},
      stopped:{color:'rgba(255,255,255,.2)',anim:'',label:'Session ended',hint:'',icon:'◎'},
    };
    const cfg=states[s]||states.idle;
    orbCore.style.background='radial-gradient(circle,'+cfg.color+'40,transparent)';
    orbCore.style.animation=cfg.anim;
    orbCore.textContent=cfg.icon;
    ring1.style.borderColor=cfg.color.replace(')',',0.2)').replace('rgba(','rgba(').replace('#','rgba(').replace(/^rgba\(#/,'rgba(');
    ring1.style.borderColor=cfg.color+'33';

    if(cfg.anim){ring1.style.animation='av-s 8s linear infinite';ring2.style.animation='av-sr 5s linear infinite';}
    else{ring1.style.animation='';ring2.style.animation='';}
    stateLabel.textContent=cfg.label;
    stateLabel.style.color=s==='listening'?C.tl:s==='processing'?C.gd:s==='speaking'?'#A78BFA':C.mu;
    stateHint.textContent=cfg.hint;
  }

  function addToTranscript(role,text){
    const m=h('div',{css:{marginBottom:'12px',textAlign:role==='u'?'right':'left'}});
    const bub=h('div',{css:{display:'inline-block',maxWidth:'90%',padding:'9px 13px',borderRadius:role==='u'?'12px 12px 2px 12px':'12px 12px 12px 2px',background:role==='u'?'rgba(0,229,192,.1)':'rgba(167,139,250,.1)',border:'1px solid '+(role==='u'?C.tb:'rgba(167,139,250,.25)'),fontFamily:CR,fontSize:'14px',color:'rgba(255,255,255,.8)',lineHeight:'1.55'}});
    bub.textContent=text;m.appendChild(bub);
    transcript.appendChild(m);
    transcript.scrollTop=transcript.scrollHeight;
    // Keep only last 6 messages
    while(transcript.children.length>6)transcript.removeChild(transcript.firstChild);
  }

  function speakText(text){
    updateOrb('speaking');
    const utt=new SpeechSynthesisUtterance(text);
    utt.rate=0.9;utt.pitch=1.05;utt.volume=1;
    const voices=window.speechSynthesis.getVoices();
    const pref=voices.find(function(v){return v.name.includes('Samantha')||v.name.includes('Google UK English Female')||v.name.includes('Karen');});
    if(pref)utt.voice=pref;
    utt.onend=function(){if(state!=='stopped')startListening();};
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utt);
  }

  async function processUserSpeech(text){
    state='processing';updateOrb('processing');
    msgs.push({r:'u',t:text});

      showCrisisModal(function(){startListening();});

    try{

      msgs.push({r:'a',t:rep});

      addToTranscript('a',rep);
      state='speaking';
      speakText(rep);
    }catch(e){
      state='listening';updateOrb('listening');startListening();
    }
  }

  function startListening(){
    if(state==='stopped')return;

    rec.continuous=true;rec.interimResults=true;rec.lang='en-US';

      for(var i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal){
          finalText+=e.results[i][0].transcript+' ';
          clearTimeout(silenceTimer);
          silenceTimer=setTimeout(function(){
            if(finalText.trim()&&state==='listening'){
              rec.stop();rec=null;
              processUserSpeech(finalText.trim());
            }
          },1400);
        }
      }
    };
    rec.onerror=function(e){if(e.error!=='no-speech'&&state==='listening'){setTimeout(startListening,500);}};
    rec.onend=function(){if(state==='listening'&&finalText.trim()===''){try{rec.start();}catch(er){}}};
    try{rec.start();}catch(e){}
  }

  function stopAll(){
    state='stopped';
    clearTimeout(silenceTimer);
    window.speechSynthesis.cancel();
    try{if(rec)rec.stop();}catch(e){}
    updateOrb('stopped');
    playBeep(330,0.25,0.2);
    setTimeout(function(){onEnd(msgs);},600);
  }

  // Start button overlay (tap to begin)
  const startOverlay=h('div',{css:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:'10',cursor:'pointer'}});
  startOverlay.addEventListener('click',function(){
    startOverlay.remove();
    startListening();
  });
  w.appendChild(startOverlay);

  updateOrb('idle');
  return w;
}

function fmtDate(ts){
  const d=new Date(ts);
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()+'  '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');

// ── TTS LISTEN BUTTON
let ttsActive=false;
function listenBtn(getText){
  const btn=h('button',{cls:'av-btn',css:{display:'flex',alignItems:'center',gap:'8px',padding:'10px 18px',fontSize:'14px',borderColor:C.tb,color:C.tl}});
  btn.innerHTML='<span style="font-size:16px">&#9654;</span><span>Listen</span>';
  btn.addEventListener('click',()=>{
    if(ttsActive){window.speechSynthesis.cancel();ttsActive=false;btn.innerHTML='<span style="font-size:16px">&#9654;</span><span>Listen</span>';btn.style.color=C.tl;return;}
    const text=getText();if(!text)return;
    const utt=new SpeechSynthesisUtterance(text);
    utt.rate=0.92;utt.pitch=1;utt.volume=1;
    const voices=window.speechSynthesis.getVoices();
    const pref=voices.find(v=>v.name.includes('Samantha')||v.name.includes('Google UK English Female')||v.name.includes('Karen'));
    if(pref)utt.voice=pref;
    utt.onstart=()=>{ttsActive=true;btn.innerHTML='<span style="font-size:16px">&#9632;</span><span>Stop</span>';btn.style.color=C.gd;};
    utt.onend=()=>{ttsActive=false;btn.innerHTML='<span style="font-size:16px">&#9654;</span><span>Listen</span>';btn.style.color=C.tl;};
    window.speechSynthesis.speak(utt);
  });
  return btn;
}

  // ── RADAR CHART (SVG Pentagon)
  function mkRadarChart(traits){
    const dim=['Openness','Conscientiousness','Extraversion','Agreeableness','Neuroticism'];
    const keys=['openness','conscientiousness','extraversion','agreeableness','neuroticism'];
    const vals=keys.map(function(k){return(traits[k]||50)/100;});
    const W=280,H=260,cx=W/2,cy=H/2,r=100;
    const n=5;
    const angles=keys.map(function(_,i){return(i*2*Math.PI/n)-Math.PI/2;});

    function pt(angle,radius){
      return {x:cx+radius*Math.cos(angle), y:cy+radius*Math.sin(angle)};
    }
    function ptStr(angle,radius){
      const p=pt(angle,radius);return p.x+','+p.y;
    }

    let svg='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="display:block;margin:0 auto">';

    // Grid pentagons
    [0.25,0.5,0.75,1].forEach(function(f){
      const pts=angles.map(function(a){return ptStr(a,r*f);}).join(' ');
      svg+='<polygon points="'+pts+'" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>';
    });
    // Axis lines
    angles.forEach(function(a){
      const end=pt(a,r);
      svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+end.x+'" y2="'+end.y+'" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>';
    });

    // Data polygon
    const dataPts=vals.map(function(v,i){return ptStr(angles[i],r*v);}).join(' ');
    svg+='<polygon points="'+dataPts+'" fill="rgba(0,229,192,0.15)" stroke="'+TEAL+'" stroke-width="2"/>';

    // Data points + percentage labels
    vals.forEach(function(v,i){
      const p=pt(angles[i],r*v);
      const pct=Math.round(v*100);
      svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+TEAL+'"/>';
      const lp=pt(angles[i],r*v+14);
      svg+='<text x="'+lp.x+'" y="'+lp.y+'" text-anchor="middle" dominant-baseline="middle" fill="'+TEAL+'" font-size="9" font-family="Crimson Pro,serif">'+pct+'%</text>';
    });

    // Axis labels
    dim.forEach(function(label,i){
      const lp=pt(angles[i],r+26);
      svg+='<text x="'+lp.x+'" y="'+lp.y+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,0.6)" font-size="10" font-family="Crimson Pro,serif">'+label+'</text>';
    });

    svg+='</svg>';

    const wrap=h('div',{css:{background:'linear-gradient(145deg,rgba(26,16,48,0.92),rgba(13,11,35,0.97))',border:'1px solid rgba(0,229,192,.15)',borderRadius:'14px',padding:'20px 12px 12px',overflow:'hidden'}});
    wrap.innerHTML=svg;
    return wrap;
  }

  // ── LIFE CHAPTERS TIMELINE
  function mkTimeline(chapters){
    const wrap=h('div',{css:{background:'linear-gradient(145deg,rgba(26,16,48,0.92),rgba(13,11,35,0.97))',border:'1px solid rgba(242,201,76,.2)',borderRadius:'14px',padding:'20px',overflowX:'auto'}});
    const n=chapters.length;
    const W=Math.max(300,n*80);
    let svg='<svg width="'+W+'" height="100" viewBox="0 0 '+W+' 100" style="display:block;min-width:'+W+'px">';
    const step=W/(n+1);
    const y=55;
    // Timeline line
    svg+='<line x1="'+step*0.5+'" y1="'+y+'" x2="'+step*(n+0.5)+'" y2="'+y+'" stroke="'+GOLD+'" stroke-width="1.5" opacity="0.4"/>';
    chapters.forEach(function(ch,i){
      const x=step*(i+1);
      const above=i%2===0;
      // Pin
      svg+='<circle cx="'+x+'" cy="'+y+'" r="8" fill="'+GOLD+'" opacity="0.85"/>';
      svg+='<circle cx="'+x+'" cy="'+y+'" r="3" fill="#0D0B23"/>';
      // Year
      svg+='<text x="'+x+'" y="'+(above?y-22:y+28)+'" text-anchor="middle" fill="'+GOLD+'" font-size="11" font-family="Crimson Pro,serif" opacity="0.9">'+ch.year+'</text>';
      // Name
      const lines=ch.name.split(' ');
      lines.forEach(function(line,li){
        const ty=above?(y-36-(lines.length-1-li)*13):(y+40+li*13);
        svg+='<text x="'+x+'" y="'+ty+'" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10" font-family="Crimson Pro,serif">'+line+'</text>';
      });
    });
    svg+='</svg>';
    wrap.innerHTML=svg;
    return wrap;
  }

  // ── VALUES LIST
  function mkValuesList(values){
    const icons=['🌱','💛','✨','🔥','🌊'];
    const wrap=h('div',{css:{display:'flex',flexDirection:'column',gap:'8px'}});

      const ic2=h('span',{css:{fontSize:'18px',flexShrink:'0'}});ic2.textContent=icons[i]||'•';row.appendChild(ic2);

    });

  }

  // ── PATTERNS GRID
  function mkPatterns(patterns){
    const grid=h('div',{css:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px'}});
    patterns.forEach(function(p){

      const str=h('p',{css:{fontFamily:CR,fontSize:'10px',color:TEAL+'99',letterSpacing:'.05em'}});str.textContent='Pattern strength: '+p.strength+'.';card.appendChild(str);
      grid.appendChild(card);
    });
    return grid;
  }

  return w;
}

function OnboardingPage(){
  const w=h('div',{css:{position:'relative',minHeight:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',background:'#0D0B23'}});
  w.appendChild(stars(50));
  
  let current=0;
  
  // Progress dots
  const dotsRow=h('div',{css:{position:'absolute',top:'28px',left:'0',right:'0',display:'flex',justifyContent:'center',gap:'6px',zIndex:'10'}});
  const dotEls=SLIDES.map((_,i)=>{
    const d=h('div',{css:{height:'3px',borderRadius:'3px',background:i===0?'#00E5C0':'rgba(255,255,255,.2)',transition:'all .3s',width:i===0?'24px':'6px'}});
    dotsRow.appendChild(d);
    return d;
  });
  w.appendChild(dotsRow);
  
  // Skip button
  const skipBtn=h('button',{css:{position:'absolute',top:'24px',right:'20px',background:'transparent',border:'none',color:'rgba(255,255,255,.3)',fontFamily:CR,fontSize:'13px',cursor:'pointer',zIndex:'10',letterSpacing:'.05em'},on:{click:()=>{S.onboarded=true;go('welcome');}}},'Skip');
  w.appendChild(skipBtn);
  
  // Slide container
  const slideWrap=h('div',{css:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 32px 40px',textAlign:'center',position:'relative',zIndex:'1'}});
  w.appendChild(slideWrap);
  
  // Bottom area
  const bottom=h('div',{css:{padding:'0 28px 48px',position:'relative',zIndex:'1'}});
  w.appendChild(bottom);
  
  function renderSlide(i){
    const s=SLIDES[i];
    slideWrap.innerHTML='';
    
    // Update dots
    dotEls.forEach((d,idx)=>{
      d.style.background=idx===i?s.color:'rgba(255,255,255,.2)';
      d.style.width=idx===i?'24px':'6px';
    });
    
    // Symbol orb
    const orbWrap=h('div',{css:{width:'100px',height:'100px',borderRadius:'50%',background:`radial-gradient(circle,${s.color}20,transparent)`,border:`1px solid ${s.color}30`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 32px',animation:'av-p 3s ease-in-out infinite',fontSize:'36px',color:s.color}});
    orbWrap.textContent=s.sym;
    slideWrap.appendChild(orbWrap);
    
    slideWrap.appendChild(h('p',{cls:'av-f',css:{fontFamily:CR,fontSize:'12px',color:s.color,letterSpacing:'.2em',textTransform:'uppercase',marginBottom:'10px'}},s.sub));
    slideWrap.appendChild(h('h2',{cls:'av-f',css:{fontFamily:PF,fontSize:'26px',fontWeight:'700',color:'#F0EEF8',marginBottom:'20px',lineHeight:'1.3'}},s.title));
    slideWrap.appendChild(h('p',{cls:'av-f',css:{fontFamily:CR,fontSize:'16px',color:'#9B94BC',lineHeight:'1.8',maxWidth:'340px',margin:'0 auto'}},s.body));
    
    // Bottom button
    bottom.innerHTML='';
    const isLast=i===SLIDES.length-1;
    const nextBtn=h('button',{cls:'av-btn av-solid',css:{width:'100%',padding:'14px',fontSize:'16px',background:s.color,color:'#0D0B1A'},on:{click:()=>{
      if(isLast){S.onboarded=true;go('welcome');}
      else{current++;renderSlide(current);}
    }}},isLast?'Begin Your Journey →':'Next');
    bottom.appendChild(nextBtn);
  }
  
  // Swipe support
  let touchX=0;
  w.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;});
  w.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchX;
    if(dx<-50&&current<SLIDES.length-1){current++;renderSlide(current);}
    if(dx>50&&current>0){current--;renderSlide(current);}
  });
  
  renderSlide(0);
  return w;
}

function buildPLAnalyseTab(analyseInn){

  DOMAINS.forEach(function(d){
    var db=h('button',{css:{display:'flex',alignItems:'center',gap:'6px',padding:'7px 14px',borderRadius:'20px',border:'1px solid rgba(255,255,255,.1)',background:'transparent',color:'rgba(255,255,255,.5)',fontFamily:CR,fontSize:'13px',cursor:'pointer',transition:'all .2s'},on:{click:function(){

  aBtn.textContent='Analyse My Decision';

  function getSaved(){try{return JSON.parse(localStorage.getItem('aevora_regret')||'[]');}catch{return[];}}
  function savePlan(p){try{var pl=getSaved();pl.unshift(p);if(pl.length>20)pl.length=20;localStorage.setItem('aevora_regret',JSON.stringify(pl));}catch{}}

  aBtn.addEventListener('click',async function(){

    var rep=await ai([{role:'user',content:'Domain: '+(selDomain||'general')+'\nDecision: '+decTa.value}],sys);

    var data={};
    try{data=JSON.parse(rep.replace(/```json|```/g,'').trim());}
    catch(e){data={regretScore:60,changeScore:40,verdict:rep,reasoning:'',microPlan:[],watchOut:''};}
    savePlan({ts:Date.now(),domain:selDomain||'general',decision:decTa.value.substring(0,80),data:data});
    renderAResult(data,aResults);

      analyseInn.appendChild(c);

  }

    var p=h('p',{css:{fontFamily:PF,fontSize:'36px',fontWeight:'700',color:s.col,marginBottom:'4px'}});p.textContent=s.score+'%';

  (data.microPlan||[]).forEach(function(step,i){
    var c=h('div',{css:{background:'rgba(20,13,38,.95)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'12px',padding:'12px 14px',marginBottom:'8px',display:'flex',gap:'12px',alignItems:'flex-start'}});

function mkTabBar(tabs, activeIdx, onChange){
  const wrap=h('div',{css:{marginBottom:'24px'}});
  const btnRow=h('div',{css:{display:'flex',gap:'0',background:'rgba(255,255,255,.04)',borderRadius:'12px',padding:'4px',marginBottom:'12px'}});
  const descArea=h('div',{css:{padding:'0 2px'}});

  function updateDesc(idx){
    descArea.innerHTML='';
    const d=h('p',{cls:'av-f',css:{fontFamily:CR,fontSize:'13px',color:'rgba(255,255,255,.45)',lineHeight:'1.6'}});
    d.textContent=tabs[idx].desc;
    descArea.appendChild(d);
  }

  tabs.forEach(function(tab,i){
    const isActive=i===activeIdx;
    const btn=h('button',{css:{
      flex:'1',padding:'9px 8px',borderRadius:'9px',border:'none',
      background:isActive?'rgba(255,255,255,.09)':'transparent',
      color:isActive?'#F0EEF8':'rgba(255,255,255,.4)',
      fontFamily:CR,fontSize:'13px',fontWeight:isActive?'600':'400',
      cursor:'pointer',transition:'all .2s',
    },on:{click:function(){
      btnRow.querySelectorAll('button').forEach(function(b,bi){
        b.style.background=bi===i?'rgba(255,255,255,.09)':'transparent';
        b.style.color=bi===i?'#F0EEF8':'rgba(255,255,255,.4)';
        b.style.fontWeight=bi===i?'600':'400';
      });
      updateDesc(i);
      onChange(i);
    }}});
    btn.textContent=tab.label;
    btnRow.appendChild(btn);
  });

  updateDesc(activeIdx);
  wrap.appendChild(btnRow);
  wrap.appendChild(descArea);
  return wrap;

    b.textContent=text;m.appendChild(b);md.appendChild(m);md.scrollTop=md.scrollHeight;
  }

  function getFutureSys(){
    var pc=S.prof?JSON.stringify(S.prof):'{}';
    return 'You are the user\'s future self, '+horizon+' years from now, speaking to your younger self.\nYou have lived through everything that lies ahead. You know the outcomes of the decisions they are currently wrestling with.\nYou are warm, honest, sometimes wistful, never preachy. You speak from experience, not theory.\nTheir current profile: '+pc+'\nRules:\n- Speak as I (their future self). Never break character.\n- Reference specifics from their profile to make it feel personal.\n- Be honest about hard things including mistakes and regrets.\n- Do not give generic advice. Speak from lived memory.\n- Keep responses 3-5 sentences. Conversational, not lecture-like.\n- End with either a question or a moment that invites reflection.';
  }

  async function startConversation(){
    if(!horizon)return;
    setupScreen.style.display='none';
    chatScreen.style.display='flex';chatScreen.style.flexDirection='column';
    busy=true;inp.disabled=true;sb.disabled=true;
    var tk=h('div',{css:{paddingLeft:'40px'}});tk.appendChild(dots());md.appendChild(tk);md.scrollTop=md.scrollHeight;
    var opening=await ai([{role:'user',content:'Begin. Speak to me for the first time.'}],getFutureSys());
    tk.remove();
    if(opening){msgs=[{role:'assistant',content:opening}];addMsg('a',opening);}
    busy=false;inp.disabled=false;sb.disabled=false;inp.focus();
  }

  async function sendMsg(){
    var text=inp.value.trim();if(!text||busy)return;
    inp.value='';busy=true;sb.disabled=true;inp.disabled=true;
    addMsg('u',text);msgs.push({role:'user',content:text});
    var tk=h('div',{css:{paddingLeft:'40px'}});tk.appendChild(dots());md.appendChild(tk);md.scrollTop=md.scrollHeight;
    var rep=await safeAI(msgs,getFutureSys(),function(){inp.focus();});
    tk.remove();
    if(!rep){showRetryBanner(md,function(){inp.value=text;sendMsg();});busy=false;sb.disabled=false;inp.disabled=false;return;}
    msgs.push({role:'assistant',content:rep});addMsg('a',rep);
    busy=false;sb.disabled=false;inp.disabled=false;inp.focus();
  }

  sb.addEventListener('click',sendMsg);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
  return w;
}

function WisdomPage(){

  function getSavedWisdom(){try{return JSON.parse(localStorage.getItem(getTodayKey())||'null');}catch{return null;}}
  function saveWisdom(d){try{localStorage.setItem(getTodayKey(),JSON.stringify(d));}catch{}}

  function getWisdomHistory(){
    var hist=[];
    for(var k in localStorage){
      if(k.startsWith('aevora_wisdom_')){
        try{var d=JSON.parse(localStorage.getItem(k));if(d)hist.push({date:k.replace('aevora_wisdom_',''),data:d});}catch{}
      }
    }
    return hist.sort(function(a,b){return b.date.localeCompare(a.date);});
  }

  async function loadDailyWisdom(){
    var saved=getSavedWisdom();
    if(saved){renderWisdomCard(saved);renderHistory();return;}
    var loader=h('div',{css:{textAlign:'center',padding:'48px 20px'}});
    loader.appendChild(orb(56,'#FCD34D'));
    var lp=h('p',{cls:'av-p',css:{fontFamily:PF,fontStyle:'italic',fontSize:'15px',color:'rgba(255,255,255,.4)',marginTop:'16px'}});lp.textContent='The oracle is consulting your eternal self...';
    loader.appendChild(lp);cardArea.appendChild(loader);
    var pc=S.prof?JSON.stringify(S.prof):'{}';
    var doy=Math.floor(Date.now()/86400000);
    var sys='You are Aevoras Wisdom Oracle. Generate deeply personalised daily wisdom for this user.\nProfile: '+pc+'\nDay seed: '+doy+'\nReturn ONLY valid JSON with: insight (1-2 sentences of wisdom drawn from their values and goals, NOT generic), theme (1-2 words), reflection (1 open question), tradition (1-3 words, e.g. Stoic, Zen, Jungian).';
    var rep=await ai([{role:'user',content:'Generate wisdom for day '+doy}],sys);
    loader.remove();
    if(!rep){var err=h('p',{css:{fontFamily:CR,fontSize:'13px',color:'rgba(255,255,255,.35)',textAlign:'center',padding:'20px'}});err.textContent='Could not load wisdom. Please check your API key in Settings.';cardArea.appendChild(err);return;}
    var data={};try{data=JSON.parse(rep.replace(/```json|```/g,'').trim());}catch{data={insight:rep,theme:'Wisdom',reflection:'What does this mean for you today?',tradition:'Universal'};}
    saveWisdom(data);
    renderWisdomCard(data);
    renderHistory();
  }

  function renderWisdomCard(data){
    cardArea.innerHTML='';
    var card=h('div',{css:{background:'linear-gradient(145deg,rgba(26,16,48,0.95),rgba(20,12,38,0.98))',border:'1px solid rgba(252,211,77,.3)',borderRadius:'20px',padding:'28px 24px',position:'relative',overflow:'hidden',boxShadow:'0 0 40px rgba(252,211,77,.06)'}});
    var glow=h('div',{css:{position:'absolute',inset:0,background:'radial-gradient(ellipse at top right,rgba(252,211,77,.06),transparent 65%)',pointerEvents:'none'}});card.appendChild(glow);
    var meta=h('div',{css:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'20px'}});
    var tp=h('p',{css:{fontFamily:CR,fontSize:'10px',letterSpacing:'.2em',textTransform:'uppercase',color:'#FCD34D',background:'rgba(252,211,77,.08)',border:'1px solid rgba(252,211,77,.2)',borderRadius:'10px',padding:'3px 10px'}});tp.textContent=data.theme||'Wisdom';
    var tr=h('p',{css:{fontFamily:CR,fontSize:'10px',letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(255,255,255,.35)',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'10px',padding:'3px 10px'}});tr.textContent=data.tradition||'';
    meta.appendChild(tp);if(data.tradition)meta.appendChild(tr);card.appendChild(meta);
    var wisdom=h('p',{css:{fontFamily:PF,fontStyle:'italic',fontSize:'20px',color:'rgba(255,255,255,.92)',lineHeight:'1.75',marginBottom:'24px'}});wisdom.textContent='"'+(data.insight||'')+'"';card.appendChild(wisdom);
    var refWrap=h('div',{css:{borderTop:'1px solid rgba(252,211,77,.15)',paddingTop:'16px'}});
    var rl=h('p',{css:{fontFamily:CR,fontSize:'10px',letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(252,211,77,.5)',marginBottom:'8px'}});rl.textContent='Today\'s reflection';
    var rq=h('p',{css:{fontFamily:CR,fontSize:'15px',color:'rgba(255,255,255,.65)',lineHeight:'1.65'}});rq.textContent=data.reflection||'';
    refWrap.appendChild(rl);refWrap.appendChild(rq);card.appendChild(refWrap);
    cardArea.appendChild(card);

    var actRow=h('div',{css:{display:'flex',gap:'10px',marginTop:'14px'}});
    var thBtn=h('button',{css:{flex:'1',padding:'11px',background:'rgba(0,229,192,.07)',border:'1px solid rgba(0,229,192,.2)',color:TEAL,fontFamily:CR,fontSize:'13px',borderRadius:'10px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'},on:{click:function(){
      S.th.msgs=[{r:'a',t:'The oracle offered you this today: "'+data.insight+'" — What does it stir in you?'}];go('therapist');

    thBtn.innerHTML='<span style="font-size:14px">◎</span><span>Explore with Therapist</span>';
    var refreshBtn=h('button',{css:{padding:'11px 14px',background:'rgba(252,211,77,.06)',border:'1px solid rgba(252,211,77,.15)',color:'rgba(252,211,77,.6)',fontFamily:CR,fontSize:'13px',borderRadius:'10px',cursor:'pointer'},on:{click:async function(){
      try{localStorage.removeItem(getTodayKey());}catch{}cardArea.innerHTML='';await loadDailyWisdom();
    }}});refreshBtn.textContent='↻';refreshBtn.title='Generate new wisdom';
    actRow.appendChild(thBtn);actRow.appendChild(refreshBtn);
    cardArea.appendChild(actRow);
  }

  function renderHistory(){
    var hist=getWisdomHistory().slice(1,8);
    if(hist.length===0)return;
    inn.appendChild(h('div',{css:{height:'1px',background:'rgba(255,255,255,.06)',margin:'4px 0 20px'}}));
    inn.appendChild(h('p',{css:{fontFamily:CR,fontSize:'11px',letterSpacing:'.18em',textTransform:'uppercase',color:'rgba(255,255,255,.3)',marginBottom:'12px'}},'Previous Wisdoms'));

      var c=h('div',{css:{background:'rgba(20,13,38,.8)',border:'1px solid rgba(255,255,255,.06)',borderRadius:'10px',padding:'12px 14px',marginBottom:'8px'}});

      c.appendChild(dl);c.appendChild(it);inn.appendChild(c);
    });
  }

  loadDailyWisdom();

  inn.appendChild(h('div',{css:{height:'1px',background:'rgba(255,255,255,.06)',margin:'4px 0 24px'}}));
